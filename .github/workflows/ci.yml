name: CI

# Debt item D11 (docs/DIGITAL_BUTLER_ROADMAP.md): nothing was gating agent
# commits to master — two of the last five releases shipped user-visible
# breakage. This is the floor, not the bar: the device-gate rules in
# AGENTS.md sit on top of it.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # AGP 9 / Kotlin 2.2 toolchain runs on JDK 21 (repo builds with JBR 21).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          install_runtime: true

      # The ~89 MB TTS models under feature/butler/src/main/assets/tts are
      # gitignored (required only for packaging a runnable APK). Compilation
      # and the Robolectric suite do not read them, so CI works from a bare
      # checkout.
      - name: Configure CMake
        run: |
          ./gradlew --no-daemon :app:generateJsonModelDebug --info || (
            echo "Gradle configure failed, running cmake manually to see error:"
            mkdir -p app/.cxx/manual
            cmake \
              -H./app/src/main/cpp \
              -B./app/.cxx/manual \
              -DCMAKE_SYSTEM_NAME=Android \
              -DCMAKE_SYSTEM_VERSION=29 \
              -DANDROID_PLATFORM=android-29 \
              -DANDROID_ABI=arm64-v8a \
              -DANDROID_NDK=$ANDROID_NDK_HOME \
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
              -GNinja \
              -DGGML_VULKAN=ON \
              -DVulkan_GLSLC_EXECUTABLE=$VULKAN_SDK/bin/glslc \
              -DHOST_C_COMPILER=/usr/bin/gcc \
              -DHOST_CXX_COMPILER=/usr/bin/g++
            exit 1
          )

      - name: Compile all modules and build APK
        run: >
          ./gradlew --no-daemon --info
          :app:compileDebugKotlin
          :feature:jotter:compileDebugKotlin
          :feature:butler:compileDebugKotlin
          :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jeeves-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Unit tests (Robolectric)
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Publish test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14
